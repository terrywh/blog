<!doctype html>
<html lang="{{ site.lang | default: " en-US" }}">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    {% seo %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    {% include head-custom.html %}
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <header class="col-xl-3 col-sm-12 pt-4 pb-4 ps-2 pe-2">
                <div class="sticky-bottom">
                    <img src="/assets/images/avatar.png" class="rounded mx-auto d-block p-4"
                        alt="{{site.title}}" />
                    <h1 class="fs-4 text-center">{{ site.title }}</h2>
                        <p class="text-center text-secondary"><small>{{ site.description }}</small></p>
                        <ul class="list-group mb-2">
                            <a href="/feed.xml" class="list-group-item list-group-item-action"><i class="bi bi-rss"></i>
                                订阅</a>
                            <a href="{{site.github.repository_url}}" class="list-group-item list-group-item-action"><i
                                    class="bi bi-filetype-md"></i> 源码</a>
                        </ul>
                        <h2 class="fs-6 text-center text-secondary ms-2">
                            <small>@{{site.time | date: "%Y"}}</small>
                        </h2>
                        <div class="btn-group mb-2">
                            <a href="https://github.com/terrywh" class="btn btn-light"><i class="bi bi-github"></i></a>
                            <a href="mailto:{{site.email}}" class="btn btn-light"><i class="bi bi-envelope"></i></a>
                        </div>
                </div>
            </header>
            <section class="col-xl-9 col-sm-12 p-2">
                <nav class="navbar navbar-expand-sm text-bg-light mb-3">
                    <ul class="navbar-nav w-100 d-block">
                        {% for sp in site.html_pages %}
                        <li class="nav-item float-end">
                            <a class="nav-link" href="{{sp.url}}"><i class="bi {{sp.icon}}"></i> {{sp.title}}</a>
                        </li>
                        {% endfor %}
                    </ul>
                </nav>
                <article class="p-2">
                    {{ content }}
                </article>
                <footer class="mb-4 text-center" style="margin-top: 4rem;">
                    <p class="text-secondary">
                        © 2012-{{site.time | date: "%Y"}} terry wu. All rights reserved.
                    </p>
                </footer>
            </section>
        </div>
    </div>
</body>

</html>
